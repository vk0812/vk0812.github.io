name: Deploy to GitHub Pages

# Deploys the built site by force-pushing ./dist to the `gh-pages` branch,
# which GitHub Pages then serves via its classic (branch-based) pipeline.
# This intentionally avoids actions/deploy-pages, whose "syncing_files ->
# Deployment failed, try again later" step is an intermittent GitHub backend
# bug that kept failing this repo's deploys.
#
# One-time setup (already done): Settings -> Pages -> Source =
# "Deploy from a branch", branch = gh-pages, folder = / (root).

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish to gh-pages branch
        run: |
          cd dist
          touch .nojekyll                       # serve files as-is, skip Jekyll
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
